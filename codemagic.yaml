workflows:
  ios-capacitor:
    name: Matpilot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            npx cap sync ios
          fi
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - T_sandnes@hotmail.com
        notify:
          success: true
          failure: true
